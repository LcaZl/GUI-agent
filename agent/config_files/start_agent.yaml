log_dir : data/logs/agent
log_level : INFO

# ==============================
# OpenAI API Parameters
# ==============================
gpt_client_settings:
  model: gpt-4o                   # Default model name
  temperature: 0.0                      # Sampling temperature
  max_retries: 3                        # Retry attempts on failure
  reasoning: 
    effort: minimal                  # Reasoning effort: none | minimal | moderate | extensive
  gpt_log_path: data/gpt_interactions 

# Environment
osworld_settings:
  provider_name : vmware
  action_space : pyautogui
  socket_timeout_sec: 1200
  init_timeout_sec: 1200
  path_to_vm: C:/Users/Luca/Desktop/thesis/OSWorld/vmware_vm_data/Ubuntu0/Ubuntu0.vmx
  snapshot_name : init_state
  headless: true
  require_a11y_tree : true
  require_terminal : true
  os_type : Ubuntu 
  enable_proxy : false
  client_username: user
  client_password: password

memory_settings:
  memory_name : mem00
  root : agent/memories
  initialize_memory : true

plan_executor_settings:
  default_pause_sec: 1.0
  observe_after_python: true

planner_settings:
  max_plan_steps: 50

perception_settings:
  use_vision: true

  debug_directory : data/debug/processed_screenshots

  omniparser_settings:
    device : cuda
    caption_backend: florence

    icon_detect_model_path : agent/models/icon_detect/model.pt
    icon_caption_model_dir : agent/models/icon_caption
    icon_caption_model_id : microsoft/Florence-2-base
    blip2_base_model_id: Salesforce/blip2-opt-2.7b

    caption_prompt : "<CAPTION>"
    ocr_languages : [en]
    yolo_image_size : 640
    # YOLO confidence threshold for icon detection.
    box_threshold : 0.2
    # IoU threshold used by YOLO NMS and overlap filtering.
    iou_threshold : 0.7
    # Discard icons smaller than this ratio of the screen area.
    min_icon_area_ratio : 0.0001
    # Discard icons larger than this ratio of the screen area.
    max_icon_area_ratio : 0.3
    # Size to which icon crops are resized before captioning (width, height).
    icon_crop_size :
      - 64
      - 64
    # Maximum tokens generated by the caption model per icon.
    caption_max_new_tokens : 20
    # Beam size for caption generation (1 = greedy decoding).
    caption_num_beams : 1
    # Small epsilon to avoid division by zero in IoU computation.
    iou_eps : 0.000001
    # Default filename prefix for visualization images.
    default_vis_prefix : omni

  a11y_extractor_settings:
    include_invisible: true
    assume_normalized_bounds: true
    clamp_bounds_to_screen: true
    max_bounds_area_ratio: 0.95
    keep_only_active_window_nodes : false
