log_dir: data/logs/agent
log_level: INFO

gpt_client_settings:
  model: gpt-4o
  temperature: 0.0
  max_retries: 3
  reasoning:
    effort: minimal
  gpt_log_path: data/gpt_interactions

osworld_settings:
  provider_name: vmware
  action_space: pyautogui
  path_to_vm: C:/Users/Luca/Desktop/thesis/OSWorld/vmware_vm_data/Ubuntu0/Ubuntu0.vmx
  snapshot_name: init_state
  headless: true
  require_a11y_tree: true
  require_terminal: true
  os_type: Ubuntu
  enable_proxy: false
  client_username: user
  client_password: password

memory_settings:
  memory_name: thesis_mem_final_perception_tuned
  root: agent/memories
  initialize_memory: true

plan_executor_settings:
  default_pause_sec: 1.0
  observe_after_python: true

planner_settings:
  max_plan_steps: 50

perception_settings:
  use_vision: false
  debug_directory: data/debug/processed_screenshots
  omniparser_settings:
    device: cuda
    caption_backend: florence
    icon_detect_model_path: agent/models/icon_detect/model.pt
    icon_caption_model_dir: agent/models/icon_caption
    icon_caption_model_id: microsoft/Florence-2-base
    blip2_base_model_id: Salesforce/blip2-opt-2.7b
    caption_prompt: "<CAPTION>"
    ocr_languages: [en]
    yolo_image_size: 640
    box_threshold: 0.2
    iou_threshold: 0.7
    min_icon_area_ratio: 0.0001
    max_icon_area_ratio: 0.3
    icon_crop_size: [64, 64]
    caption_max_new_tokens: 20
    caption_num_beams: 1
    iou_eps: 0.000001
    default_vis_prefix: omni
  a11y_extractor_settings:
    include_invisible: false
    assume_normalized_bounds: true
    clamp_bounds_to_screen: true
    max_bounds_area_ratio: 0.95
    keep_only_active_window_nodes: false
